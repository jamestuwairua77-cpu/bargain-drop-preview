<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Product — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#666;--muted-2:#999;--line:#eee;--line-2:#f5f5f5;--red:#e60023;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:88px}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}
.top-bar .back{font-size:1.1rem;font-weight:600}
.top-bar .actions{display:flex;gap:14px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f5f5f5;transition:background .15s}
.icon-btn:hover{background:#eaeaea}
.icon-btn svg{width:18px;height:18px}
.icon-btn.wishlisted{background:#fee}
.icon-btn.wishlisted svg{fill:var(--red);stroke:var(--red)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.55rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.cart-wrap{position:relative}

/* Image gallery */
.prod-img-gallery{width:100%;aspect-ratio:1;overflow:hidden;background:#f5f5f5;position:relative}
.prod-img-gallery img{width:100%;height:100%;object-fit:contain}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:5}
.gallery-nav.prev{left:12px}.gallery-nav.next{right:12px}
.gallery-nav svg{width:16px;height:16px}
.gallery-badge{position:absolute;top:12px;left:12px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;z-index:5}
.gallery-badge.new{background:var(--green)}
.gallery-badge.limited{background:var(--amber)}
.wishlist-fab{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:5;transition:transform .2s}
.wishlist-fab:hover{transform:scale(1.1)}
.wishlist-fab svg{width:20px;height:20px;stroke:#333;fill:none;transition:all .2s}
.wishlist-fab.active svg{fill:var(--red);stroke:var(--red)}
.wishlist-fab.active{background:#fff}

.prod-thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding:4px 16px;scrollbar-width:none}
.prod-thumbs::-webkit-scrollbar{display:none}
.prod-thumbs img{width:60px;height:60px;min-width:60px;object-fit:cover;border-radius:8px;border:2px solid transparent;cursor:pointer}
.prod-thumbs img.active{border-color:var(--fg)}
