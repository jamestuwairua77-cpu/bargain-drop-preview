<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Product — Bargain Drop v10</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}img{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}
.top-bar a{font-size:.75rem;font-weight:600;color:var(--muted)}
.prod-img-gallery{width:100%;aspect-ratio:1;overflow:hidden;background:#f5f5f5}
.prod-img-gallery img{width:100%;height:100%;object-fit:contain}
.prod-thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding:4px 14px}
.prod-thumbs img{width:60px;height:60px;min-width:60px;object-fit:cover;border-radius:8px;border:2px solid transparent;cursor:pointer}
.prod-thumbs img.active{border-color:var(--fg)}
.product-info{padding:14px}
.product-info h1{font-size:.95rem;font-weight:700;line-height:1.3;margin-bottom:8px}
.price-section{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.current-price{font-size:1.4rem;font-weight:800;color:var(--red)}
.original-price{font-size:.8rem;color:var(--muted);text-decoration:line-through}
.discount-badge{font-size:.7rem;font-weight:700;color:var(--green)}
.action-buttons{display:flex;gap:8px}
.add-cart-main{flex:1;padding:12px;background:var(--fg);color:#fff;border:none;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer}
.prod-desc-wrap{margin:0 14px 20px;padding:16px;background:#fff;border-radius:12px;border:1px solid var(--line)}
.prod-desc-wrap h3{font-size:.9rem;font-weight:700;margin-bottom:10px}
.prod-desc{font-size:.75rem;color:var(--muted);line-height:1.6}
.prod-desc img{max-width:100%!important;height:auto!important;border-radius:8px;margin:8px 0}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--fg);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.75rem;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text" id="loading-text">Loading product...</div></div>
<div class="top-bar"><a href="javascript:history.back()">← Back</a></div>
<div class="prod-img-gallery" id="prod-gallery"><img id="product-img" src="" alt=""></div>
<div class="prod-thumbs" id="prod-thumbs"></div>
<div class="product-info">
  <h1 id="product-title">Loading...</h1>
  <div class="price-section">
    <span class="current-price" id="product-price">$0.00</span>
    <span class="original-price" id="product-original" style="display:none"></span>
    <span class="discount-badge" id="product-discount" style="display:none"></span>
  </div>
  <div class="action-buttons"><button class="add-cart-main" onclick="addToCart()">Add to Cart</button></div>
</div>
<div class="prod-desc-wrap"><h3>Description</h3><div class="prod-desc" id="product-desc">Loading...</div></div>
<nav class="bottom-nav">
  <a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" fill="none" stroke="#777" stroke-width="2"/></svg>Home</a>
  <a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/><rect x="14" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" fill="none" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" fill="none" stroke="#777" stroke-width="2"/></svg>Me</a>
</nav>
<script>
var product=null,qty=1,pid=(new URLSearchParams(location.search)).get('id');
if(!pid){hideLoad();showError('No product ID')}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hideLoad(){document.getElementById('loading-overlay').style.display='none'}
function showError(m){document.getElementById('product-title').textContent=m;hideLoad()}
function showProduct(p){
  product=p;
  document.getElementById('product-title').textContent=p.title||'Untitled';
  document.getElementById('product-price').textContent='$'+(p.price||0).toFixed(2);
  if(p.compare_at_price&&p.compare_at_price>p.price){
    var d=document.getElementById('product-original');d.textContent='$'+Number(p.compare_at_price).toFixed(2);d.style.display='';
    var db=document.getElementById('product-discount');db.textContent=Math.round((1-p.price/p.compare_at_price)*100)+'% OFF';db.style.display='';
  }
  var imgs=p.images||[p.image];
  if(imgs.length>0)document.getElementById('product-img').src=imgs[0];
  if(imgs.length>1){var g=document.getElementById('prod-gallery'),t=document.getElementById('prod-thumbs');g.innerHTML='';t.innerHTML='';imgs.forEach(function(s,i){var gi=document.createElement('img');gi.src=s;gi.alt='';gi.style.display=i===0?'block':'none';gi.setAttribute('data-idx',i);g.appendChild(gi);var ti=document.createElement('img');ti.src=s;ti.alt='';ti.className=i===0?'active':'';ti.onclick=function(){g.querySelectorAll('img').forEach(function(gi2){gi2.style.display='none'});var gi3=g.querySelector('img[data-idx="'+i+'"]');if(gi3)gi3.style.display='block';t.querySelectorAll('img').forEach(function(tm){tm.classList.remove('active')});ti.classList.add('active')};t.appendChild(ti)})}
  document.getElementById('product-desc').innerHTML=p.body_html||'No description available.';
  hideLoad();
}
(function load(){
  document.getElementById('loading-text').textContent='Loading product...';
  var x=new XMLHttpRequest();x.open('GET',https://raw.githubusercontent.com/jamestuwairua77-cpu/bargain-drop-preview/main/categories-data.json,true);
  x.onload=function(){
    if(x.status>=200&&x.status<400){
      var d=JSON.parse(x.responseText);
      for(var c in d){var items=d[c].products||[];for(var i=0;i<items.length;i++){if(String(items[i].id)===pid){showProduct(items[i]);return}}}
    }
    showError('Product not found');
  };
  x.onerror=function(){showError('Failed to load')};
  x.send();
})();
function addToCart(){if(!product)return;var cart=JSON.parse(localStorage.getItem('bd_cart')||'[]');var ex=cart.find(function(x){return String(x.id)===String(product.id)});if(ex){ex.qty+=qty}else{cart.push({id:product.id,title:product.title,price:product.price,image:product.image||(product.images||[])[0]||'',qty:qty})}localStorage.setItem('bd_cart',JSON.stringify(cart));alert('Added to cart!')}
</script>
</body>
</html>
