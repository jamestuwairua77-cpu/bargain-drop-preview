<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Product — Bargain Drop</title>
<style>
:root{
  --bg:#fff;--fg:#111;--muted:#666;--muted-light:#999;--line:#eee;--line-2:#f5f5f5;
  --red:#e60023;--red-dark:#c40020;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6;
  --success-bg:#ecfdf5;--warn-bg:#fffbeb;--info-bg:#eff6ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:88px;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}
.top-bar-left{display:flex;align-items:center;gap:12px}
.top-bar a.back{font-size:.85rem;font-weight:600;color:var(--fg);display:flex;align-items:center;gap:4px}
.top-bar-actions{display:flex;gap:14px}
.top-bar-actions button{padding:6px;display:flex;align-items:center;justify-content:center;position:relative}
.cart-count-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:.55rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Gallery */
.prod-img-gallery{width:100%;aspect-ratio:1;overflow:hidden;background:#f8f8f8;position:relative}
.prod-img-gallery img{width:100%;height:100%;object-fit:contain}
.gallery-badge{position:absolute;top:12px;left:12px;background:var(--red);color:#fff;font-size:.65rem;font-weight:800;padding:5px 10px;border-radius:6px;letter-spacing:.02em}
.gallery-count{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;padding:4px 10px;border-radius:20px}
.prod-thumbs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.prod-thumbs::-webkit-scrollbar{display:none}
.prod-thumbs img{width:60px;height:60px;min-width:60px;object-fit:cover;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.prod-thumbs img.active{border-color:var(--fg)}

/* Product info */
.product-info{padding:16px}
.product-info h1{font-size:1.05rem;font-weight:700;line-height:1.35;margin-bottom:10px;color:var(--fg)}

/* Ratings summary */
.rating-summary{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stars{display:inline-flex;gap:1px;align-items:center}
.stars svg{width:14px;height:14px}
.rating-num{font-size:.78rem;font-weight:700;color:var(--fg)}
.rating-count{font-size:.72rem;color:var(--muted);text-decoration:underline}
.sold-count{font-size:.72rem;color:var(--muted)}

/* Price section — LARGE, easy to read */
.price-section{background:linear-gradient(180deg,#fff5f5 0%,#fff 100%);border:1px solid #ffe0e0;border-radius:12px;padding:14px;margin-bottom:16px}
.price-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.current-price{font-size:2rem;font-weight:800;color:var(--red);letter-spacing:-.02em;line-height:1}
.original-price{font-size:.95rem;color:var(--muted);text-decoration:line-through}
.discount-badge{background:var(--red);color:#fff;font-size:.7rem;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
.savings{font-size:.72rem;color:var(--green);font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px}
.price-note{font-size:.68rem;color:var(--muted);margin-top:4px}

/* Variant selectors */
.variant-block{margin-bottom:16px}
.variant-label{font-size:.75rem;font-weight:700;color:var(--fg);margin-bottom:8px;display:flex;justify-content:space-between}
.variant-label span:first-child::after{content:":"}
.variant-selected{font-weight:400;color:var(--muted)}
.variant-options{display:flex;flex-wrap:wrap;gap:8px}
.variant-btn{padding:9px 14px;border:1.5px solid var(--line);border-radius:8px;background:#fff;font-size:.75rem;font-weight:600;color:var(--fg);cursor:pointer;transition:all .15s;position:relative;min-width:44px;text-align:center}
.variant-btn:hover:not(.oos){border-color:var(--fg)}
.variant-btn.active{border-color:var(--fg);background:var(--fg);color:#fff}
.variant-btn.oos{color:var(--muted-light);background:#f8f8f8;cursor:not-allowed;text-decoration:line-through}
.variant-btn.oos::after{content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:#ccc;transform:rotate(-8deg)}
.color-swatch{width:36px;height:36px;padding:0;border-radius:50%;border:2.5px solid var(--line);position:relative;overflow:hidden}
.color-swatch.active{border-color:var(--fg);transform:scale(1.05)}
.color-swatch.oos{opacity:.4;cursor:not-allowed}
.color-swatch.oos::after{content:"×";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-shadow:0 0 3px #000;font-size:1.2rem}

/* Quantity */
.qty-block{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qty-label{font-size:.75rem;font-weight:700}
.qty-control{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
.qty-btn{width:36px;height:36px;font-size:1.1rem;font-weight:600;background:#fff;color:var(--fg)}
.qty-btn:hover{background:#f5f5f5}
.qty-btn:disabled{color:var(--muted-light);cursor:not-allowed}
.qty-value{width:44px;text-align:center;font-weight:700;font-size:.85rem}
.stock-info{font-size:.7rem;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}

/* Policy Transparency badges */
.policy-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px;background:#fafafa;border:1px solid var(--line);border-radius:12px;padding:12px}
.policy-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;padding:4px}
.policy-item svg{width:20px;height:20px;color:var(--fg)}
.policy-item .title{font-size:.65rem;font-weight:700;color:var(--fg);line-height:1.3}
.policy-item .desc{font-size:.6rem;color:var(--muted);line-height:1.3}

/* Trust & Security */
.trust-badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:
