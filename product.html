<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Product — Bargain Drop v9</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}img{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}
.top-bar a{font-size:0.75rem;font-weight:600;color:var(--muted)}
.top-bar span{font-size:0.6rem;color:var(--green);font-weight:600}
.product-gallery{margin-bottom:0}
.prod-img-gallery{width:100%;aspect-ratio:1;overflow:hidden;background:#f5f5f5}
.prod-img-gallery img{width:100%;height:100%;object-fit:contain}
.prod-thumbs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding:4px 14px}
.prod-thumbs img{width:60px;height:60px;min-width:60px;object-fit:cover;border-radius:8px;border:2px solid transparent;cursor:pointer}
.prod-thumbs img.active{border-color:var(--fg)}
.prod-thumbs img:hover{opacity:.8}
.product-info{padding:14px}
.product-info h1{font-size:0.95rem;font-weight:700;line-height:1.3;margin-bottom:8px}
.rating-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.stars{color:#f5a623;font-size:0.8rem}
.rating-count{font-size:0.65rem;color:var(--muted)}
.price-section{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.current-price{font-size:1.4rem;font-weight:800;color:var(--red)}
.original-price{font-size:0.8rem;color:var(--muted);text-decoration:line-through}
.discount-badge{font-size:0.7rem;font-weight:700;color:var(--green)}
.qty-section{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qty-section label{font-size:0.7rem;font-weight:600}
.qty-controls{display:flex;align-items:center;gap:0}
.qty-btn{width:36px;height:36px;border:1.5px solid var(--line);background:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn:first-child{border-radius:8px 0 0 8px}
.qty-btn:last-child{border-radius:0 8px 8px 0}
.qty-val{width:44px;height:36px;border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:600}
.action-buttons{display:flex;gap:8px}
.add-cart-main{flex:1;padding:12px;background:var(--fg);color:#fff;border:none;border-radius:10px;font-size:0.78rem;font-weight:700;cursor:pointer}
.buy-now{flex:1;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:0.78rem;font-weight:700;cursor:pointer}
.prod-desc-wrap{margin:0 14px 20px;padding:16px;background:#fff;border-radius:12px;border:1px solid var(--line)}
.prod-desc-wrap h3{font-size:0.9rem;font-weight:700;margin-bottom:10px}
.prod-desc{font-size:0.75rem;color:var(--muted);line-height:1.6}
.prod-desc img{max-width:100%;height:auto;border-radius:8px;margin:8px 0}
.prod-desc p{margin:6px 0}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--fg);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.75rem;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text" id="loading-text">Loading product...</div></div>
<div class="top-bar"><a href="javascript:history.back()">← Back</a><span>Free Shipping $29+</span></div>
<div class="product-gallery">
  <div class="prod-img-gallery" id="prod-gallery"><img id="product-img" src="" alt="Product"></div>
  <div class="prod-thumbs" id="prod-thumbs"></div>
</div>
<div class="product-info">
  <h1 id="product-title">Loading...</h1>
  <div class="rating-row"><span class="stars">★★★★☆</span><span class="rating-count">4.2 (128 reviews)</span></div>
  <div class="price-section">
    <span class="current-price" id="product-price">$0.00</span>
    <span class="original-price" id="product-original" style="display:none"></span>
    <span class="discount-badge" id="product-discount" style="display:none"></span>
  </div>
  <div class="qty-section"><label>Qty:</label><div class="qty-controls"><button class="qty-btn" onclick="chgQty(-1)">−</button><div class="qty-val" id="qty-val">1</div><button class="qty-btn" onclick="chgQty(1)">+</button></div></div>
  <div class="action-buttons"><button class="add-cart-main" onclick="addToCart()">Add to Cart</button><button class="buy-now" onclick="buyNow()">Buy Now</button></div>
</div>
<div class="prod-desc-wrap"><h3>Description</h3><div class="prod-desc" id="product-desc">Loading description...</div></div>
<nav class="bottom-nav">
  <a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" fill="none" stroke="#777" stroke-width="2"/></svg>Home</a>
  <a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/><rect x="14" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Shop</a>
  <a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" fill="none" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" fill="none" stroke="#777" stroke-width="2"/></svg>Me</a>
</nav>
<script>
function updateCartCount(){var c=JSON.parse(localStorage.getItem("bd_cart")||"[]");var el=document.getElementById("cart-count");if(el)el.textContent=c.reduce(function(s,i){return s+(i.qty||1)},0)}
var qty=1;var product=null;
function chgQty(d){qty=Math.max(1,qty+d);document.getElementById("qty-val").textContent=qty}
var params=new URLSearchParams(location.search);var pid=params.get("id");

function hideLoading(){var o=document.getElementById("loading-overlay");if(o)o.style.display="none"}
function setLoadingText(t){var el=document.getElementById("loading-text");if(el)el.textContent=t}

function showProduct(prods){
  for(var i=0;i<prods.length;i++){if(String(prods[i].id)===pid){product=prods[i];break;}}
  if(!product)return false;
  document.getElementById("product-title").textContent=product.title;
  document.getElementById("product-price").textContent="$"+(product.price||0).toFixed(2);
  if(product.compare_at_price&&product.compare_at_price>product.price){
    document.getElementById("product-original").textContent="$"+Number(product.compare_at_price).toFixed(2);
    document.getElementById("product-discount").textContent=Math.round((1-product.price/product.compare_at_price)*100)+"% OFF";
    document.getElementById("product-original").style.display="";
    document.getElementById("product-discount").style.display="";
  }else{
    document.getElementById("product-original").style.display="none";
    document.getElementById("product-discount").style.display="none";
  }
  var imgs=product.images||[product.image];
  if(imgs.length>0){
    document.getElementById("product-img").src=imgs[0];
    if(imgs.length>1){
      var gallery=document.getElementById("prod-gallery");
      var thumbs=document.getElementById("prod-thumbs");
      gallery.innerHTML="";thumbs.innerHTML="";
      imgs.forEach(function(src,i){
        var gimg=document.createElement("img");
        gimg.src=src;gimg.alt="";gimg.style.display=i===0?"block":"none";
        gimg.setAttribute("data-idx",i);gallery.appendChild(gimg);
        var t=document.createElement("img");
        t.src=src;t.alt="";t.className=i===0?"active":"";
        t.onclick=(function(idx){return function(){
          gallery.querySelectorAll("img").forEach(function(g){g.style.display="none"});
          var gi=gallery.querySelector('img[data-idx="'+idx+'"]');
          if(gi)gi.style.display="block";
          thumbs.querySelectorAll("img").forEach(function(tm){tm.classList.remove("active")});
          t.classList.add("active");
        }})(i);
        thumbs.appendChild(t);
      });
    }
  }
  var descEl=document.getElementById("product-desc");
  var desc=product.body_html||"";
  if(desc){descEl.innerHTML=desc}else{descEl.textContent="No description available."}
  return true;
}

function showError(msg){
  document.getElementById("product-title").textContent=msg||"Product not found";
  document.getElementById("product-price").textContent="$0.00";
  document.getElementById("product-original").style.display="none";
  document.getElementById("product-discount").style.display="none";
  document.getElementById("product-desc").textContent="Sorry, this product could not be loaded.";
  hideLoading();
}

// Load product data
(function init(){
  if(!pid){showError("No product ID specified");return}
  var cached=localStorage.getItem("bd_product_"+pid);
  if(cached){try{var arr=JSON.parse(cached);if(showProduct(arr)){hideLoading();return}}catch(e){}}
  setLoadingText("Loading product...");
  var xhr=new XMLHttpRequest();
  xhr.open("GET","products/"+pid+".json",true);xhr.timeout=10000;
  xhr.onload=function(){
    if(xhr.status===200){try{var p=JSON.parse(xhr.responseText);if(showProduct([p])){localStorage.setItem("bd_product_"+pid,JSON.stringify([p]));hideLoading();return}}catch(e){}}
    setLoadingText("Loading catalog...");
    var x2=new XMLHttpRequest();x2.open("GET","categories-data.json",true);x2.timeout=30000;
    x2.onload=function(){if(x2.status===200){try{var d2=JSON.parse(x2.responseText);var all=[];for(var c in d2){all=all.concat(d2[c].products||[])}if(showProduct(all)){localStorage.setItem("bd_product_"+pid,JSON.stringify([product]));hideLoading();return}}catch(e){}}showError("Product not found")};
    x2.onerror=function(){showError("Failed to load")};x2.send();
  };
  xhr.onerror=function(){var x2=new XMLHttpRequest();x2.open("GET","categories-data.json",true);x2.timeout=30000;x2.onload=function(){if(x2.status===200){try{var d2=JSON.parse(x2.responseText);var all=[];for(var c in d2){all=all.concat(d2[c].products||[])}if(showProduct(all)){localStorage.setItem("bd_product_"+pid,JSON.stringify([product]));hideLoading();return}}catch(e){}}showError("Product not found")};x2.onerror=function(){showError("Failed to load")};x2.send()};
  xhr.send();
})();

function addToCart(){if(!product)return;var cart=JSON.parse(localStorage.getItem("bd_cart")||"[]");var ex=cart.find(function(x){return String(x.id)===String(product.id)});if(ex){ex.qty+=qty}else{cart.push({id:product.id,title:product.title,price:product.price,image:product.image||(product.images||[])[0]||"",qty:qty})}localStorage.setItem("bd_cart",JSON.stringify(cart));updateCartCount();alert("Added "+qty+" item(s) to cart!")}
function buyNow(){addToCart();location.href="checkout.html"}
updateCartCount();
</script>
</body>
</html>
