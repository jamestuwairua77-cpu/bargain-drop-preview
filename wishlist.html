<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Wishlist — Bargain Drop</title>
<link rel="stylesheet" href="css/account.css">
</head>
<body>
<div class="top-bar"><a href="profile.html">← Back</a><div>Free Shipping $29+</div></div>
<div class="page-header">
  <div class="breadcrumb"><a href="profile.html">My Account</a> →> Wishlist</div>
  <h1>Wishlist</h1>
  <p class="subtitle">Items you've saved</p>
</div>
<div class="section">
  <div class="card-list" id="wishlist-list"></div>
  <div class="empty-state" id="empty-state">
    <div class="icon">❤️</div>
    <h2>Your wishlist is empty</h2>
    <p>Save items you love to your wishlist.</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<nav class="bottom-nav">
  <a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2"/></svg>Home</a>
  <a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="wishlist.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#111" stroke-width="1.5"/></svg>Wishlist</a>
  <a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2"/></svg>Me</a>
</nav>
<script src="js/account.js"></script>
<script>
(function(){
  var user = BD.requireAuth(); if (!user) return;
  var wishlist = BD.wishlist.list();
  var list = document.getElementById('wishlist-list');
  var empty = document.getElementById('empty-state');
  if (wishlist.length === 0) { empty.style.display='block'; return; }
  empty.style.display='none';
  wishlist.forEach(function(item){
    var row = document.createElement('a');
    row.className = 'list-row';
    row.href = 'product.html?id='+item.id;
    var imgHtml = item.img ? '<img src="'+item.img+'" alt="" style="width:36px;height:36px;border-radius:8px;object-fit:cover;background:#f5f5f5">' : '<div class="mi-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#333" stroke-width="1.5"/></svg></div>';
    row.innerHTML = imgHtml +
      '<div class="mi-info"><div class="mi-label">'+item.name+'</div><div class="mi-desc">'+(item.price ? BD.fmtMoney(item.price) : '')+'</div></div><span class="mi-arrow" style="color:#e60023" onclick="BD.wishlist.remove(\''+item.id+'\');event.stopPropagation();event.preventDefault();renderWishlist()">✍</span>';
    list.appendChild(row);
  });
})();
</script>
</body>
</html>
