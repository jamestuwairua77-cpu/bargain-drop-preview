<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Register — Bargain Drop v10</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:360px;padding:30px 24px;border:1px solid var(--line);border-radius:16px;text-align:center}
.auth-card h1{font-size:1.2rem;font-weight:800;margin-bottom:20px}
.auth-card input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:.82rem;margin-bottom:12px;outline:none}
.auth-card input:focus{border-color:var(--fg)}
.auth-card button{width:100%;padding:12px;background:var(--fg);color:#fff;border:none;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:8px}
.auth-card a{font-size:.7rem;color:var(--muted);text-decoration:underline}
</style>
</head>
<body>
<div class="auth-card">
  <h1>Register</h1>
  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="alert('Coming soon!')">Register</button>
  <p style="margin-top:12px"><a href="sign-in.html">Already have an account? Sign In</a></p>
  <p style="margin-top:8px"><a href="/">← Back to Home</a></p>
</div>
</body>
</html>
