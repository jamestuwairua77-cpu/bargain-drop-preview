<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>My Account — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;padding:20px}
.container{max-width:480px;margin:40px auto}
.profile-header{display:flex;align-items:center;gap:16px;padding:24px;border:1px solid var(--line);border-radius:16px;margin-bottom:16px}
.profile-header img{border-radius:50%;width:64px;height:64px;background:var(--line)}
.profile-header .info h2{font-size:1.1rem;font-weight:700}
.profile-header .info p{font-size:.78rem;color:var(--muted);margin-top:2px}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:.85rem}
.menu-item:hover{background:#f9f9f9}
.menu-item .arrow{color:var(--muted)}
.logout-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:20px}
.back-link{display:block;text-align:center;margin-top:16px;font-size:.75rem;color:var(--muted);text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <div class="profile-header" id="profile-header">
    <img id="profile-pic" src="" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2240%22>?</text></svg>';this.style.background='transparent'">
    <div class="info">
      <h2 id="profile-name">Loading...</h2>
      <p id="profile-email"></p>
    </div>
  </div>
  
  <div class="menu-item" onclick="location.href='/'"><span>🏠 Home</span><span class="arrow">→</span></div>
  <div class="menu-item" onclick="location.href='cart.html'"><span>🛒 My Cart</span><span class="arrow">→</span></div>
  <div class="menu-item"><span>📦 My Orders</span><span class="arrow">→</span></div>
  <div class="menu-item"><span>❤️ Wishlist</span><span class="arrow">→</span></div>
  
  <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
  <a class="back-link" href="/">← Back to Home</a>
</div>

<script>
(function(){
  var user = JSON.parse(localStorage.getItem('bd_session')||'null');
  if(!user){location.href='/sign-in.html';return}
  document.getElementById('profile-name').textContent=user.name||'User';
  document.getElementById('profile-email').textContent=user.email||'';
  if(user.picture) document.getElementById('profile-pic').src=user.picture;
})();

function handleLogout(){
  localStorage.clear();
  location.href='/';
}
</script>
</body>
</html>
