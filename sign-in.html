<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Sign In — Bargain Drop v10</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.auth-card{width:100%;max-width:360px;padding:30px 24px;border:1px solid var(--line);border-radius:16px;text-align:center}.auth-card h1{font-size:1.2rem;font-weight:800;margin-bottom:20px}.auth-card input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:.82rem;margin-bottom:12px;outline:none}.auth-card input:focus{border-color:var(--fg)}.auth-card .primary-btn{width:100%;padding:12px;background:var(--fg);color:#fff;border:none;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:8px}.auth-card a{font-size:.7rem;color:var(--muted);text-decoration:underline}
.google-btn{width:100%;padding:10px 12px;background:#fff;color:#555;border:1.5px solid #ddd;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}.google-btn:hover{background:#f8f8f8;border-color:#ccc}.google-btn img{width:18px;height:18px}
.separator{display:flex;align-items:center;gap:10px;margin:14px 0 4px;color:var(--muted);font-size:.65rem}.separator::before,.separator::after{content:'';flex:1;height:1px;background:var(--line)}
</style>
</head>
<body>
<div class="auth-card">
  <h1>Sign In</h1>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button class="primary-btn" onclick="alert('Coming soon!')">Sign In</button>
  <div class="separator">or</div>
  <button class="google-btn" onclick="alert('Coming soon!')"><img src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 48 48%22><path fill=%22%23EA4335%22 d=%22M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z%22/><path fill=%22%234285F4%22 d=%22M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z%22/><path fill=%22%23FBBC05%22 d=%22M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z%22/><path fill=%22%2334A853%22 d=%22M24 48c6.48 0 11.93-2.13 15.88-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z%22/><path fill=%22none%22 d=%22M0 0h48v48H0z%22/></svg>" alt="Google">Sign in with Google</button>

  <p style="margin-top:14px"><a href="register.html">Don't have an account? Register</a></p>
  <p style="margin-top:8px"><a href="/">← Back to Home</a></p>
</div>
</body>
</html>
