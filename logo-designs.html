<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Designs — Bargain Drop</title>
<style>
:root{--bg:#111;--fg:#fff;--muted:#aaa;--line:#333;--accent:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:30px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:100}
.top-bar h1{font-size:1rem;font-weight:800}
.top-bar a{color:var(--accent);font-size:0.75rem}
.header{padding:20px 16px;text-align:center}
.header p{font-size:0.8rem;color:var(--muted)}
.design-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px;max-width:1200px;margin:0 auto}
.design-card{background:#1a1a1a;border:2px solid #333;border-radius:16px;padding:24px 16px;text-align:center;transition:all .2s;cursor:pointer}
.design-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.design-card.selected{border-color:#22c55e;box-shadow:0 0 0 2px #22c55e}
.design-card .badge{position:absolute;top:8px;right:8px;background:#22c55e;color:#fff;font-size:0.6rem;padding:2px 8px;border-radius:10px;display:none}
.design-card.selected .badge{display:block}
.design-card .num{font-size:0.7rem;color:var(--muted);margin-bottom:8px}
.design-card .logo-preview{font-size:1.8rem;font-weight:900;margin-bottom:6px}
.design-card .desc{font-size:0.7rem;color:var(--muted)}
.design-card .apply-btn{margin-top:10px;padding:8px 20px;border-radius:20px;font-size:0.7rem;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#111;transition:all .15s}
.design-card .apply-btn:hover{opacity:.85}
.design-card.selected .apply-btn{background:#22c55e;color:#fff}
.note{padding:16px;text-align:center;font-size:0.7rem;color:var(--muted)}
</style>
</head>
<body>
<div class="top-bar"><h1>🎨 Logo Designs</h1><a href="index.html">← Back to Store</a></div>
<div class="header"><p>Pick a design — it updates the logo on every page. <b>50 designs</b> to choose from.</p></div>
<div class="design-grid" id="grid"></div>
<div class="note">Selected design saves automatically to your browser.</div>

(function(){
var sel = localStorage.getItem('bd_logo') || '34';
var grid = document.getElementById('grid');
DESIGNS.forEach(function(d){
var card = document.createElement('div');
card.className = 'design-card' + (d.n==sel ? ' selected' : '');
card.style.position = 'relative';
card.innerHTML = '<div class="badge">✓ Selected</div><div class="num">Design #' + d.n + '</div><div class="logo-preview">' + d.html + '</div><div class="desc">' + d.desc + '</div><button class="apply-btn" onclick="select(' + d.n + ')">' + (d.n==sel ? 'Selected' : 'Apply') + '</button>';
grid.appendChild(card);
});
})();

function select(n){
localStorage.setItem('bd_logo', n);
location.reload();
}
