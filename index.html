<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Bargain Drop — Preview v10</title>
<style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}a{color:inherit;text-decoration:none}img{display:block}.top-bar{display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(90deg,#ff6b6b,#feca57,#ff9ff3,#54a0ff,#5f27cd);padding:6px 0;position:sticky;top:0;z-index:110}.top-bar-inner{white-space:nowrap;font-size:.68rem;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);letter-spacing:1px;animation:scrollText 8s linear infinite}@keyframes scrollText{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}.logo{display:flex;align-items:center;gap:6px}.logo-text{font-size:1.15rem;font-weight:900}.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text .bd-d{color:#111}.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900}.header-actions{display:flex;align-items:center;gap:14px}.header-actions a{padding:2px}.header-actions svg{width:20px;height:20px;stroke:#555;stroke-width:1.8;fill:none}.search-wrap{padding:8px 14px;background:#fff}.search-box{display:flex;align-items:center;background:#f5f5f5;border-radius:20px;padding:8px 14px;gap:8px;border:1.5px solid transparent}.search-box:focus-within{border-color:#111;background:#fff}.search-box input{border:none;background:none;outline:none;flex:1;font-size:.78rem}.section-title{font-size:.85rem;font-weight:800;padding:16px 14px 8px;display:flex;justify-content:space-between;align-items:center}.section-title a{font-size:.7rem;font-weight:500;color:var(--muted)}.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 14px 16px}@media(min-width:768px){.cat-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}.cat-card{display:flex;flex-direction:column;overflow:hidden;border-radius:12px;border:1.5px solid var(--line);cursor:pointer;background:#fff;transition:all .15s}.cat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}.cat-hero{width:100%;aspect-ratio:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;background:#f0f0f0;overflow:hidden}.cat-hero img{width:100%;height:100%;object-fit:cover}.cat-hero img:first-child{grid-row:1/3}.cat-card-info{padding:8px 10px 10px;text-align:center}.cat-card-info .cc-label{font-size:.7rem;font-weight:700;line-height:1.2}.cat-card-info .cc-count{font-size:.6rem;color:var(--muted);margin-top:2px}.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 14px 16px}@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}.product-card{border-radius:10px;overflow:hidden;border:1.5px solid var(--line);background:#fff;transition:all .15s}.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}.prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}.prod-img img{width:100%;height:100%;object-fit:cover}.prod-badge{position:absolute;top:4px;left:4px;background:var(--red);color:#fff;font-size:.55rem;font-weight:700;padding:2px 5px;border-radius:4px}.prod-info{padding:6px 8px 8px}.prod-title{font-size:.7rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}.prod-price-row{display:flex;align-items:center;gap:4px}.prod-price{font-size:.85rem;font-weight:800;color:var(--red)}.prod-compare{font-size:.6rem;color:var(--muted);text-decoration:line-through}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.6rem;color:var(--muted);text-decoration:none}.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}.nav-icon{width:20px;height:20px}.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.loading-text{text-align:center;padding:40px;color:var(--muted);grid-column:1/-1}</style></head>
<body>
<div class="top-bar"><div class="top-bar-inner">🔥 SUMMER MEGA SALE — UP TO 70% OFF — FREE SHIPPING ON ORDERS $29+ — SHOP NOW 🔥</div></div>
<div class="header"><div class="logo"><div class="logo-icon">BD</div><div class="logo-text"><span class="bd-b">BARGAIN</span> <span class="bd-d">DROP</span></div></div><div class="header-actions"><a href="products.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/></svg></a><a href="profile.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a></div></div>
<div class="search-wrap"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="search-input" type="text" placeholder="Search products..." oninput="doSearch()"></div></div>

<script>var CEMOJI={"Women's Clothing": "\ud83d\udc57", "Home, Garden & Furniture": "\ud83c\udfe0", "Jewelry & Watches": "\ud83d\udc8d", "Automobiles & Motorcycles": "\ud83c\udfcd\ufe0f", "Health, Beauty & Hair": "\ud83d\udc84", "Men's Clothing": "\ud83d\udc54", "Bags & Shoes": "\ud83d\udc5c", "Pet Supplies": "\ud83d\udc3e", "Toys, Kids & Babies": "\ud83e\uddf8", "Home Improvement": "\ud83d\udd27", "Sports & Outdoors": "\u26bd", "Phones & Accessories": "\ud83d\udcf1", "Consumer Electronics": "\ud83c\udfa7", "Other": "\ud83d\udce6"};function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}var ALL=[],RAW={};(function load(){var x=new XMLHttpRequest();x.open('GET','https://cdn.jsdelivr.net/gh/jamestuwairua77-cpu/bargain-drop-preview@main/categories-data.json',true);x.onload=function(){if(x.status>=200&&x.status<400){RAW=JSON.parse(x.responseText);var cats=Object.keys(RAW),prods=[];for(var i=0;i<cats.length;i++){var c=cats[i],items=RAW[c]&&RAW[c].products?RAW[c].products:[];for(var j=0;j<items.length;j++){var p=items[j];p._cat=c;p._emoji=CEMOJI[c]||'📦';prods.push(p)}}ALL=prods;renderCats(cats);renderProds(prods.slice(0,50))}};x.send()})();function renderCats(cats){var g=document.getElementById('cat-grid');g.innerHTML='';for(var i=0;i<cats.length;i++){var c=cats[i],info=RAW[c]||{},heroes=info.hero_images||[],items=info.products||[],emoji=CEMOJI[c]||'📦';var a=document.createElement('a');a.className='cat-card fade-in';a.href='category.html?cat='+encodeURIComponent(c);var imgHtml='';if(heroes.length>0){imgHtml='<div class="cat-hero">';for(var h=0;h<4&&h<heroes.length;h++){imgHtml+='<img src="'+heroes[h]+'" alt="" loading="lazy"'+(h===0?' style="grid-row:1/3"':'')+'>'}imgHtml+='</div>'}else{imgHtml='<div class="cat-hero"><div style="grid-row:1/3;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#f5f5f5;width:100%;height:100%">'+emoji+'</div><div style="background:#f5f5f5"></div><div style="background:#f5f5f5"></div><div style="background:#f5f5f5"></div></div>'}a.innerHTML=imgHtml+'<div class="cat-card-info"><div class="cc-label">'+esc(c)+'</div><div class="cc-count">'+items.length.toLocaleString()+' products</div></div>';g.appendChild(a)}}function renderProds(prods){var g=document.getElementById('product-grid');g.innerHTML='';if(!prods.length){g.innerHTML='<div class="loading-text">No products found</div>';return}for(var i=0;i<prods.length;i++){var p=prods[i],img=p.image||(p.images||[])[0]||'';var a=document.createElement('a');a.className='product-card fade-in';a.href='product.html?id='+p.id;var disc='';if(p.compare_at_price&&p.compare_at_price>p.price)disc='<div class="prod-badge">-'+Math.round((1-p.price/p.compare_at_price)*100)+'%</div>';a.innerHTML='<div class="prod-img">'+disc+(img?'<img src="'+img+'" alt="" loading="lazy">':'<div style="font-size:4rem;opacity:.2">📦</div>')+'</div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span>'+(p.compare_at_price&&p.compare_at_price>p.price?'<span class="prod-compare">$'+p.compare_at_price.toFixed(2)+'</span>':'')+'</div></div>';g.appendChild(a)}}function doSearch(){var q=document.getElementById('search-input').value.toLowerCase().trim();renderProds(q?ALL.filter(function(p){return(p.title||'').toLowerCase().indexOf(q)>=0}).slice(0,50):ALL.slice(0,50))}</script></body></html>
