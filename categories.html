<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Categories — Bargain Drop v10</title>
<style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}a{color:inherit;text-decoration:none}.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}.top-bar a{font-size:.75rem;font-weight:600;color:var(--muted)}.top-bar span{font-size:.65rem;font-weight:700}.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px 16px}@media(min-width:768px){.cat-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}.cat-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:12px;border:1.5px solid var(--line);cursor:pointer;background:#fff;text-align:center}.cat-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}.cat-card .cc-emoji{font-size:2.5rem}.cat-card .cc-label{font-size:.72rem;font-weight:700;line-height:1.2}.cat-card .cc-count{font-size:.6rem;color:var(--muted)}.loading-text{text-align:center;padding:40px;color:var(--muted);grid-column:1/-1}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.6rem;color:var(--muted);text-decoration:none}.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}.nav-icon{width:20px;height:20px}.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}</style></head>
<body><div class="top-bar"><a href="/">← Home</a><span>All Categories</span></div>

<script>var CEMOJI={"Women's Clothing": "\ud83d\udc57", "Home, Garden & Furniture": "\ud83c\udfe0", "Jewelry & Watches": "\ud83d\udc8d", "Automobiles & Motorcycles": "\ud83c\udfcd\ufe0f", "Health, Beauty & Hair": "\ud83d\udc84", "Men's Clothing": "\ud83d\udc54", "Bags & Shoes": "\ud83d\udc5c", "Pet Supplies": "\ud83d\udc3e", "Toys, Kids & Babies": "\ud83e\uddf8", "Home Improvement": "\ud83d\udd27", "Sports & Outdoors": "\u26bd", "Phones & Accessories": "\ud83d\udcf1", "Consumer Electronics": "\ud83c\udfa7", "Other": "\ud83d\udce6"};(function load(){var x=new XMLHttpRequest();x.open('GET','https://raw.githubusercontent.com/jamestuwairua77-cpu/bargain-drop-preview/main/categories-data.json',true);x.onload=function(){if(x.status>=200&&x.status<400){var d=JSON.parse(x.responseText),cs=Object.keys(d),g=document.getElementById('cat-grid');g.innerHTML='';cs.forEach(function(c){var items=d[c]&&d[c].products?d[c].products:[],emoji=CEMOJI[c]||'📦',a=document.createElement('a');a.className='cat-card fade-in';a.href='category.html?cat='+encodeURIComponent(c);a.innerHTML='<div class="cc-emoji">'+emoji+'</div><div class="cc-label">'+c.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div><div class="cc-count">'+items.length.toLocaleString()+' products</div>';g.appendChild(a)})}};x.send()})();</script></body></html>
