<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Payment Methods — Bargain Drop</title>
<link rel="stylesheet" href="css/account.css">
</head>
<body>
<div class="top-bar"><a href="profile.html">← Back</a><div>Free Shipping $29+</div></div>
<div class="page-header">
  <div class="breadcrumb"><a href="profile.html">My Account</a> 〺 Payment Methods</div>
  <h1>Saved Payment Methods</h1>
  <p class="subtitle">Cards, Shop Pay &amp; more</p>
</div>
<div class="section">
  <div class="card-list" id="payment-list"></div>
  <div class="empty-state" id="empty-state">
    <div class="icon">💳</div>
    <h2>No payment methods</h2>
    <p>Add a credit card or connect Shop Pay to get started.</p>
  </div>
</div>
<div class="section">
  <div class="card-list" style="padding:16px" id="payment-form">
    <strong style="font-size:.78rem;margin-bottom:12px;display:block">Add New Card</strong>
    <div class="form-group"><label>Card Number</label><input type="text" id="field-number" placeholder="4242 4242 4242 4242"></div>
    <div class="form-group"><label>Name on Card</label><input type="text" id="field-holder" placeholder="John Doe"></div>
    <div class="form-row">
      <div class="form-group"><label>Expiry</label><input type="text" id="field-expiry" placeholder="MM/YY"></div>
      <div class="form-group"><label>CVV</label><input type="text" id="field-cvv" placeholder="123"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addPayment()">Save Card</button>
    <p style="font-size:.65rem;color:var(--muted);margin-top:8px;text-align:center">Your card details are stored securely and never shared.</p>
  </div>
</div>
<nav class="bottom-nav">
  <a href="index.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2"/></svg>Home</a>
  <a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5"/></svg>Wishlist</a>
  <a href="profile.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#111" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="#111" stroke-width="2"/></svg>Me</a>
</nav>
<script src="js/account.js"></script>
<script>
(function(){
  var user = BD.requireAuth(); if (!user) return;
  renderPayments();
  function renderPayments(){
    var pays = BD.payments.list();
    var list = document.getElementById('payment-list');
    var empty = document.getElementById('empty-state');
    if (pays.length === 0) { list.style.display='none'; empty.style.display='block'; return; }
    empty.style.display='none';
    var html = '';
    pays.forEach(function(p){
      html += '<div class="list-row">';
      html += '<div class="mi-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="#333" stroke-width="1.8"/><line x1="2" y1="10" x2="22" y2="10" stroke="#333" stroke-width="1.5"/></svg></div>';
      html += '<div class="mi-info"><div class="mi-label">' + BD.escape(p.brand || 'Card') + ' ending in ' + BD.escape((p.last4 || '****').slice(-4)) + '</div><div class="mi-desc">Expires ' + BD.escape(p.expiry || '--') + '</div></div>';
      if (p.isDefault) html += '<span class="status-pill default">Default</span>';
      html += '<span class="mi-arrow">→</span>';
      html += '</div>';
    });
    list.innerHTML = html;
  }
  window.addPayment = function(){
    var p = {
      id: BD.uid('pay'),
      brand: 'Visa',
      last4: (document.getElementById('field-number').value || '4242').slice(-4),
      expiry: document.getElementById('field-expiry').value || '12/26',
      holder: document.getElementById('field-holder').value
    };
    if (!p.holder) return alert('Name on card is required.');
    BD.payments.add(p);
    renderPayments();
    ['field-number','field-holder','field-expiry','field-cvv'].forEach(function(id){ document.getElementById(id).value = ''; });
    var t = document.getElementById('toast'); if (t) { t.textContent = 'Card saved!'; t.className += ' show'; setTimeout(function(){ t.className = t.className.replace(' show',''); }, 2000); }
  };
})();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
