<!doctype html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>All Products — Bargain Drop v10</title>
<style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}a{color:inherit;text-decoration:none}img{display:block}.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}.top-bar a{font-size:.75rem;font-weight:600;color:var(--muted)}.top-bar span{font-size:.6rem;color:var(--muted)}.page-header{padding:14px 14px 0}.page-header h1{font-size:1rem;font-weight:800}.page-header p{font-size:.7rem;color:var(--muted);margin-top:4px}.search-wrap{padding:8px 14px;background:#fff}.search-box{display:flex;align-items:center;background:#f5f5f5;border-radius:20px;padding:8px 14px;gap:8px;border:1.5px solid transparent}.search-box:focus-within{border-color:#111;background:#fff}.search-box input{border:none;background:none;outline:none;flex:1;font-size:.78rem}.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px 16px}@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}.product-card{border-radius:10px;overflow:hidden;border:1.5px solid var(--line);background:#fff;transition:all .15s}.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}.prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}.prod-img img{width:100%;height:100%;object-fit:cover}.prod-badge{position:absolute;top:4px;left:4px;background:var(--red);color:#fff;font-size:.55rem;font-weight:700;padding:2px 5px;border-radius:4px}.prod-info{padding:6px 8px 8px}.prod-title{font-size:.7rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}.prod-price-row{display:flex;align-items:center;gap:4px}.prod-price{font-size:.85rem;font-weight:800;color:var(--red)}.prod-compare{font-size:.6rem;color:var(--muted);text-decoration:line-through}.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 14px 20px;flex-wrap:wrap}.pagination button{padding:6px 12px;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-size:.72rem;cursor:pointer;color:var(--fg);min-width:36px}.pagination button:hover:not(:disabled){background:var(--fg);color:#fff;border-color:var(--fg)}.pagination button.active{background:var(--fg);color:#fff;border-color:var(--fg);font-weight:700}.pagination button:disabled{opacity:.4}.pagination span{padding:0 2px;color:var(--muted);font-size:.7rem}.loading-text{text-align:center;padding:40px;color:var(--muted);grid-column:1/-1}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.6rem;color:var(--muted);text-decoration:none}.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}.nav-icon{width:20px;height:20px}.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}</style></head>
<body><div class="top-bar"><a href="javascript:history.back()">← Back</a><span id="total-count">Loading...</span></div><div class="page-header"><h1>All Products</h1><p id="result-count">Loading...</p></div><div class="search-wrap"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="search-input" type="text" placeholder="Search products..." oninput="doSearch()"></div></div><div class="product-grid" id="product-grid"><div class="loading-text">Loading products...</div></div><div class="pagination" id="pagination"></div><nav class="bottom-nav"><a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" fill="none" stroke="#777" stroke-width="2"/></svg>Home</a><a href="products.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/><rect x="14" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/></svg>Products</a><a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a><a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" fill="none" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" fill="none" stroke="#777" stroke-width="2"/></svg>Me</a></nav>
<script>function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}var all=[],filtered=[],pageSize=50,current=1;(function load(){var x=new XMLHttpRequest();x.open('GET','https://cdn.jsdelivr.net/gh/jamestuwairua77-cpu/bargain-drop-preview@main/categories-data.json',true);x.onload=function(){if(x.status>=200&&x.status<400){var d=JSON.parse(x.responseText);for(var c in d){var items=d[c].products||[];for(var i=0;i<items.length;i++)all.push(items[i])}document.getElementById('total-count').textContent=all.length.toLocaleString()+' products';filtered=all.slice();renderPage(1);renderPagination();document.getElementById('result-count').textContent=all.length.toLocaleString()+' products'}};x.send()})();function renderPage(pn){var g=document.getElementById('product-grid');g.innerHTML='';var start=(pn-1)*pageSize,slice=filtered.slice(start,start+pageSize);if(!slice.length){g.innerHTML='<div class="loading-text">No products found.</div>';return}slice.forEach(function(p){var a=document.createElement('a');a.className='product-card fade-in';a.href='product.html?id='+p.id;var disc='';if(p.compare_at_price&&p.compare_at_price>p.price)disc='<div class="prod-badge">-'+Math.round((1-p.price/p.compare_at_price)*100)+'% OFF</div>';a.innerHTML='<div class="prod-img">'+disc+'<img src="'+esc(p.image||'')+'" onerror="this.style.display=\'none\'"></div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span>'+(p.compare_at_price&&p.compare_at_price>p.price?'<span class="prod-compare">$'+Number(p.compare_at_price).toFixed(2)+'</span>':'')+'</div></div>';g.appendChild(a)});window.scrollTo({top:0,behavior:'smooth'})}function renderPagination(){var el=document.getElementById('pagination'),tp=Math.ceil(filtered.length/pageSize);if(tp<=1){el.innerHTML='';return}var h='';h+='<button onclick="goPage('+(current-1)+')" '+(current===1?'disabled':'')+'>Prev</button>';var s=Math.max(1,current-2),e=Math.min(tp,current+2);if(s>1){h+='<button onclick="goPage(1)">1</button>';if(s>2)h+='<span>...</span>'}for(var p=s;p<=e;p++)h+='<button class="'+(p===current?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';if(e<tp){if(e<tp-1)h+='<span>...</span>';h+='<button onclick="goPage('+tp+')">'+tp+'</button>'}h+='<button onclick="goPage('+(current+1)+')" '+(current===tp?'disabled':'')+'>Next</button>';el.innerHTML=h}function goPage(n){var tp=Math.ceil(filtered.length/pageSize);if(n<1||n>tp||n===current)return;current=n;renderPage(n);renderPagination()}function doSearch(){var q=document.getElementById('search-input').value.toLowerCase().trim();filtered=q?all.filter(function(p){return(p.title||'').toLowerCase().indexOf(q)>=0}):all.slice();current=1;renderPage(1);renderPagination();document.getElementById('result-count').textContent=filtered.length+' products'+(q?' matching "'+q+'"':'')}</script></body></html>
