<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>All Products — Bargain Drop</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--accent:#111}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;color:#fff;font-size:0.7rem;position:sticky;top:0;z-index:110}
.top-bar a{color:#fff}

/* Search */
.search-bar{padding:10px 16px;background:#fff;border-bottom:1px solid var(--line)}
.search-bar input{width:100%;padding:12px 16px 12px 40px;border:2px solid var(--line);border-radius:24px;font-size:0.82rem;outline:none;background:#f8f8f8;transition:all .2s}
.search-bar input:focus{border-color:var(--fg);background:#fff}

/* Filter Button */
.filter-bar{padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.filter-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .15s}
.filter-btn:hover{background:#f5f5f5}
.filter-btn .filter-icon{width:16px;height:16px}
.filter-panel{display:none;padding:12px 16px;background:#fafafa;border-bottom:1px solid var(--line);animation:slideDown 0.2s ease}
.filter-panel.open{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
.filter-group{margin-bottom:12px}
.filter-group label{display:block;font-size:0.7rem;font-weight:700;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.filter-group select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:0.78rem;background:#fff;outline:none}
.filter-group select:focus{border-color:var(--fg)}
.filter-actions{display:flex;gap:8px}
.filter-actions button{flex:1;padding:10px;border-radius:8px;font-size:0.72rem;font-weight:600;cursor:pointer;border:none}
.btn-apply{background:var(--accent);color:#fff}
.btn-reset{background:#f0f0f0;color:var(--fg)}

.page-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.page-header h1{font-size:1rem;font-weight:800}
.page-header .count{font-size:0.7rem;color:var(--muted)}

.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 16px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);transition:0.15s;cursor:pointer}
.product-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.product-card .prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.product-card .prod-img img{width:100%;height:100%;object-fit:cover}
.product-card .prod-img .no-img{font-size:3rem;color:#ccc}
.product-card .prod-info{padding:8px 10px 10px}
.product-card .prod-title{font-size:0.72rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.product-card .prod-price-row{display:flex;align-items:center;gap:6px}
.product-card .prod-price{font-size:0.85rem;font-weight:800;color:var(--red)}
.product-card .prod-compare{font-size:0.65rem;color:var(--muted);text-decoration:line-through}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active{color:var(--fg)}
.nav-svg{width:20px;height:20px;flex-shrink:0}

.loading{text-align:center;padding:60px 20px;color:var(--muted)}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}
</style>
</head>
<body>
<div class="top-bar"><a href="index.html">← Home</a><div>Free Shipping $29+</div></div>
<div class="search-bar"><input type="text" id="search-input" placeholder="Search products..." oninput="renderProducts()"></div>

<div class="filter-bar">
  <button class="filter-btn" onclick="toggleFilter()">
    <svg class="filter-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#555" stroke-width="1.5" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.5" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#555" stroke-width="1.5" fill="none"/></svg>
    Filter & Sort
  </button>
</div>
<div class="filter-panel" id="filter-panel">
  <div class="filter-group"><label>Category</label><select id="filter-cat" onchange="renderProducts()"><option value="">All Categories</option></select></div>
  <div class="filter-group"><label>Subcategory</label><select id="filter-subcat" onchange="renderProducts()"><option value="">All Subcategories</option></select></div>
  <div class="filter-group"><label>Sort By</label><select id="filter-sort" onchange="renderProducts()"><option value="">Default</option><option value="price-asc">Price: Low to High</option><option value="price-desc">Price: High to Low</option><option value="name-asc">Name: A-Z</option><option value="name-desc">Name: Z-A</option></select></div>
  <div class="filter-actions"><button class="btn-reset" onclick="resetFilter()">Reset</button></div>
</div>

<div class="page-header"><h1>All Products</h1><span class="count" id="product-count"></span></div>
<div class="product-grid" id="product-grid"><div class="loading">Loading products...</div></div>

<nav class="bottom-nav">
  <a href="index.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
  <a href="products.html" class="active"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#111" stroke-width="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#111" stroke-width="1.5" fill="none"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="#"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
  <a href="profile.html"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>

<script>
var allProducts = [];
var allCats = {};

function toggleFilter(){
  document.getElementById('filter-panel').classList.toggle('open');
}

function resetFilter(){
  document.getElementById('filter-cat').value = '';
  document.getElementById('filter-subcat').value = '';
  document.getElementById('filter-sort').value = '';
  renderProducts();
}

async function init(){
  try{
    var resp = await fetch('categories-data.json');
    allCats = await resp.json();
    Object.keys(allCats).forEach(function(cat){
      var info = allCats[cat];
      (info.products || []).forEach(function(p){ allProducts.push(p); });
      document.getElementById('filter-cat').innerHTML += '<option value="'+esc(cat)+'">'+cat+'</option>';
      (info.subcategories || []).forEach(function(sub){
        document.getElementById('filter-subcat').innerHTML += '<option value="'+esc(sub.title)+'">'+sub.title+' ('+sub.product_count+')</option>';
      });
    });
    renderProducts();
  }catch(e){
    document.getElementById('product-grid').innerHTML = '<div class="loading">Error loading products: '+e.message+'</div>';
  }
}

function renderProducts(){
  var search = (document.getElementById('search-input').value || '').toLowerCase().trim();
  var cat = document.getElementById('filter-cat').value;
  var subcat = document.getElementById('filter-subcat').value;
  var sort = document.getElementById('filter-sort').value;
  
  var filtered = allProducts.slice();
  if(search){
    filtered = filtered.filter(function(p){ return (p.title||'').toLowerCase().indexOf(search) !== -1; });
  }
  if(cat){
    var catInfo = allCats[cat];
    if(catInfo && catInfo.products){
      var catProdIds = {};
      catInfo.products.forEach(function(p){ catProdIds[p.id] = true; });
      filtered = filtered.filter(function(p){ return catProdIds[p.id]; });
    }
  }
  if(subcat){
    filtered = filtered.filter(function(p){
      return (p.product_type || '').toLowerCase().indexOf(subcat.toLowerCase()) !== -1;
    });
  }
  
  if(sort === 'price-asc') filtered.sort(function(a,b){ return (a.price||0) - (b.price||0); });
  else if(sort === 'price-desc') filtered.sort(function(a,b){ return (b.price||0) - (a.price||0); });
  else if(sort === 'name-asc') filtered.sort(function(a,b){ return (a.title||'').localeCompare(b.title||''); });
  else if(sort === 'name-desc') filtered.sort(function(a,b){ return (b.title||'').localeCompare(a.title||''); });
  
  document.getElementById('product-count').textContent = filtered.length + ' products';
  var grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  if(filtered.length === 0){ grid.innerHTML = '<div class="loading">No products found</div>'; return; }
  
  filtered.forEach(function(p){
    var imgHtml = p.image ? '<img src="'+p.image+'" alt="" loading="lazy">' : '<span class="no-img">📦</span>';
    var card = document.createElement('a');
    card.className = 'product-card';
    card.href = 'product.html?id=' + p.id;
    card.innerHTML = '<div class="prod-img">'+imgHtml+'</div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span><span class="prod-compare">$'+(p.compare_at_price||0).toFixed(2)+'</span></div></div>';
    grid.appendChild(card);
  });
}

function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
init();
</script>
</body>
</html>
