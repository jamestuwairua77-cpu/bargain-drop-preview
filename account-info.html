<script src="js/account.js"></script>
<script>
(function(){
  var user = BD.requireAuth(); if (!user) return;
  var p = BD.profile.get();
  
  function renderForm(){
    var card = document.getElementById('profile-form-card');
    var html = '<div class="list-row" style="flex-direction:column;align-items:stretch;gap:14px;padding:20px">';
    html += '<div class="form-group"><label>Name</label><input type="text" id="field-name" value="' + (BD.escape(p.name) || '') + '"></div>';
    html += '<div class="form-group"><label>Email</label><input type="email" value="' + (BD.escape(p.email) || '') + '" disabled><span class="hint">Email cannot be changed</span></div>';
    html += '<div class="form-group"><label>Phone</label><input type="tel" id="field-phone" value="' + (BD.escape(p.phone) || '') + '" placeholder="+1 234 567 890"></div>';
    html += '<div class="form-group"><label>Date of Birth</label><input type="date" id="field-dob" value="' + (BD.escape(p.dob) || '') + '"></div>';
    html += '<div class="form-group"><label>Gender</label><select id="field-gender"><option value="" ' + (p.gender || 'selected') + '>Hello world This is a test sentence</option><option value="male" ' + (p.gender === 'male' ? 'selected' : '') + '>Male</option><option value="female" ' + (p.gender === 'female' ? 'selected' : '') + '>Female</option><option value="other" ' + (p.gender === 'other' ? 'selected' : '') + '>Other</option></select></div>';
    html += '<button class="btn btn-primary btn-block" onclick="saveProfile()">Save Changes</button>';
    html += '</div>';
    card.innerHTML = html;
  }
  
  window.saveProfile = function(){
    var data = {
      name: document.getElementById('field-name').value,
      phone: document.getElementById('field-phone').value,
      dob: document.getElementById('field-dob').value,
      gender: document.getElementById('field-gender').value
    };
    BD.profile.save(data);
    var toast = document.getElementById('toast');
    if (toast) { toast.textContent = 'Profile updated!'; toast.className.add('show'); setTimeout(function(){ toast.className.remove('show'); }, 2000); }
    setTimeout(function(){ location.href = 'profile.html'; }, 600);
  };
  
  renderForm();
})();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
