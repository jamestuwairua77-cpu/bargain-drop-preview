<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="page-title">Category — Bargain Drop v9</title>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:80px}
a{color:inherit;text-decoration:none}img{display:block}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line)}
.top-bar a{font-size:0.75rem;font-weight:600;color:var(--muted)}
.top-bar span{font-size:0.65rem;font-weight:700}
.page-header{padding:14px 14px 0}
.page-header h1{font-size:1rem;font-weight:800}
.page-header p{font-size:0.7rem;color:var(--muted);margin-top:4px}
.subcat-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.subcat-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:0.68rem;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.subcat-chip:hover,.subcat-chip.active{background:var(--fg);color:#fff;border-color:var(--fg)}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px 16px}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}}
.product-card{border-radius:10px;overflow:hidden;border:1.5px solid var(--line);background:#fff;transition:all .15s}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.prod-img{aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-badge{position:absolute;top:4px;left:4px;background:var(--red);color:#fff;font-size:0.55rem;font-weight:700;padding:2px 5px;border-radius:4px}
.prod-info{padding:6px 8px 8px}
.prod-title{font-size:0.7rem;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}
.prod-price-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.prod-price{font-size:0.85rem;font-weight:800;color:var(--red)}
.prod-compare{font-size:0.6rem;color:var(--muted);text-decoration:line-through}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 14px 20px;flex-wrap:wrap}
.pagination button{padding:6px 12px;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-size:0.72rem;cursor:pointer;color:var(--fg);transition:all .1s;min-width:36px}
.pagination button:hover:not(:disabled){background:var(--fg);color:#fff;border-color:var(--fg)}
.pagination button.active{background:var(--fg);color:#fff;border-color:var(--fg);font-weight:700}
.pagination button:disabled{opacity:0.4;cursor:default}
.pagination span{padding:0 2px;color:var(--muted);font-size:0.7rem}
.loading-text{text-align:center;padding:40px;grid-column:1/-1;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:0.6rem;color:var(--muted);text-decoration:none}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="top-bar"><a href="javascript:history.back()">← Back</a><span id="cat-name">Loading...</span></div>
<div class="page-header"><h1 id="cat-title">Category</h1><p id="result-count"></p></div>
<div class="subcat-bar" id="subcat-bar"></div>
<div class="product-grid" id="product-grid"><div class="loading-text">Loading products...</div></div>
<div class="pagination" id="pagination"></div>
<nav class="bottom-nav">
  <a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" fill="none" stroke="#777" stroke-width="2"/></svg>Home</a>
  <a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/><rect x="14" y="3" fill="none" stroke="#777" stroke-width="1.5" width="7" height="7" rx="1"/></svg>Products</a>
  <a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M12 12h16M12 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
  <a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" fill="none" stroke="#777" stroke-width="2"/><circle cx="12" cy="7" r="4" fill="none" stroke="#777" stroke-width="2"/></svg>Me</a>
</nav>
<script>
var all=[],display=[],pageSize=50,currentPage=1,totalPages=1,cat="",sub="";
function esc(t){return(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
var params=new URLSearchParams(location.search);
cat=params.get("cat")||params.get("category")||"";
function load(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","categories-data.json",true);xhr.timeout=30000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{var d=JSON.parse(xhr.responseText);
        if(d[cat]){all=d[cat].products||[]}else{all=[];for(var k in d){all=all.concat(d[k].products||[])}}
        display=all.slice();
        buildSubcats();
        filterSub("");
      }catch(e){showErr()}
    }else{showErr()}
  };xhr.onerror=showErr;xhr.send();
}
function showErr(){
  document.getElementById("product-grid").innerHTML='<div class="loading-text">Failed to load products. Try again.</div>';
}
function buildSubcats(){
  var bar=document.getElementById("subcat-bar");
  var subs={};
  all.forEach(function(p){var s=p.subcategory||"All";subs[s]=(subs[s]||0)+1});
  var keys=Object.keys(subs).sort(function(a,b){return subs[b]-subs[a]});
  bar.innerHTML="";
  var allBtn=document.createElement("button");
  allBtn.className="subcat-chip active";allBtn.textContent="All ("+all.length+")";
  allBtn.onclick=function(){filterSub("")};bar.appendChild(allBtn);
  keys.forEach(function(k){
    var btn=document.createElement("button");
    btn.className="subcat-chip";btn.textContent=esc(k)+" ("+subs[k]+")";
    btn.onclick=function(){filterSub(k)};bar.appendChild(btn);
  });
  document.getElementById("cat-name").textContent=cat||"All Categories";
  document.getElementById("cat-title").textContent=cat||"All Categories";
  document.getElementById("page-title").textContent=(cat||"Categories")+" — Bargain Drop v9";
}
function filterSub(s){
  sub=s;currentPage=1;
  if(s){display=all.filter(function(p){return p.subcategory===s})}
  else{display=all.slice()}
  totalPages=Math.ceil(display.length/pageSize);
  var chips=document.querySelectorAll(".subcat-chip");
  chips.forEach(function(c){c.classList.toggle("active",c.textContent.indexOf(s)!==-1||(!s&&c.textContent.indexOf("All")===0))});
  renderPageNum(1);
  renderPagination();
}
function renderPageNum(pageNum){
  var grid=document.getElementById("product-grid");
  grid.innerHTML="";
  var start=(pageNum-1)*pageSize;
  var slice=display.slice(start,start+pageSize);
  document.getElementById("result-count").textContent=display.length+" products"+(sub?" in \""+sub+"\"":"");
  if(!slice.length){grid.innerHTML='<div class="loading-text">No products found.</div>';return}
  slice.forEach(function(p,i){
    var card=document.createElement("div");
    card.className="product-card fade-in";
    card.style.animationDelay=(i*0.03)+"s";
    card.innerHTML='<a href="product.html?id='+p.id+'"><div class="prod-img">'+(p.compare_at_price&&p.compare_at_price>p.price?'<div class="prod-badge">'+Math.round((1-p.price/p.compare_at_price)*100)+'% OFF</div>':"")+'<img src="'+esc(p.image)+'" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23eee%22 width=%22100%22 height=%22100%22/></svg>\'"></div><div class="prod-info"><div class="prod-title">'+esc(p.title)+'</div><div class="prod-price-row"><span class="prod-price">$'+(p.price||0).toFixed(2)+'</span>'+(p.compare_at_price&&p.compare_at_price>p.price?'<span class="prod-compare">$'+Number(p.compare_at_price).toFixed(2)+'</span>':"")+'</div></div></a>';
    grid.appendChild(card);
  });
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderPagination(){
  var el=document.getElementById("pagination");
  if(totalPages<=1){el.innerHTML="";return}
  var h="";
  h+='<button onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?"disabled":"")+'>« Prev</button>';
  var s=Math.max(1,currentPage-2),e=Math.min(totalPages,currentPage+2);
  if(s>1){h+='<button onclick="goPage(1)">1</button>';if(s>2)h+='<span>...</span>'}
  for(var p=s;p<=e;p++){h+='<button class="'+(p===currentPage?"active":"")+'" onclick="goPage('+p+')">'+p+'</button>'}
  if(e<totalPages){if(e<totalPages-1)h+='<span>...</span>';h+='<button onclick="goPage('+totalPages+')">'+totalPages+'</button>'}
  h+='<button onclick="goPage('+(currentPage+1)+')" '+(currentPage===totalPages?"disabled":"")+'>Next »</button>';
  el.innerHTML=h;
}
function goPage(n){if(n<1||n>totalPages||n===currentPage)return;currentPage=n;renderPageNum(n);renderPagination()}
window.onload=load;
</script>
</body>
</html>
